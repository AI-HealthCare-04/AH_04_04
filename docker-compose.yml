services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: "Asia/Seoul"
    ports:
      - "${DB_EXPOSE_PORT:-3306}:${DB_PORT:-3306}"
    networks:
      - app-network
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --port=${DB_PORT:-3306}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: app/Dockerfile
    image: ${DOCKER_USER:-ah0404}/${DOCKER_REPOSITORY:-senior-challenge}:app-${APP_VERSION:-local}
    env_file: .env
    command: >
      sh -c "uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    ports:
      - "${APP_EXPOSE_PORT:-8000}:8000"
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
