name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies (app + dev)
        run: uv sync --group app --group dev --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy (type check)
        run: uv run --group app --group dev mypy .

      - name: Pytest
        run: uv run --group app --group dev pytest
