name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies (app + dev)
        run: uv sync --group app --group dev --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy (type check)
        run: uv run --group app --group dev mypy .

      - name: Pytest
        env:
          TEST_DB_REQUIRED: "1"
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_USER: root
          TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        run: uv run --group app --group dev pytest

      - name: Alembic migration round-trip + drift check
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_USER: root
          DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        run: uv run --group app --group dev python scripts/check_migrations.py
