name: Android CI

on:
  pull_request:
    branches:
      - android/dev
      - main
    paths:
      - "android/**"
      - ".github/workflows/android-ci.yml"
  push:
    branches:
      - android/dev
      - main
    paths:
      - "android/**"
      - ".github/workflows/android-ci.yml"

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Compile, test, lint, and assemble
        run: >-
          ./gradlew
          :app:compileDebugKotlin
          :app:testDebugUnitTest
          :app:lintDebug
          :app:assembleDebug
          --no-daemon
          --stacktrace

      - name: Upload failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-failure-reports-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            android/app/build/reports/
            android/app/build/test-results/

      - name: Upload debug APK
        if: success() && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          if-no-files-found: error
          retention-days: 7
          path: android/app/build/outputs/apk/debug/app-debug.apk
