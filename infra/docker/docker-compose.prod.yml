services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-Ozcoding1234@}
      MYSQL_DATABASE: ${DB_NAME:-ai_health}
      MYSQL_USER: ${DB_USER:-ozcoding}
      MYSQL_PASSWORD: ${DB_PASSWORD:-Password1234@}
      TZ: "Asia/Seoul"
    ports:
      - "${DB_EXPOSE_PORT:-3306}:${DB_PORT:-3306}"
    networks:
      - app-network
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --port=${DB_PORT:-3306}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    image: ${DOCKER_USER:-ah0404}/${DOCKER_REPOSITORY:-senior-challenge}:app-${APP_VERSION:-v1.0.0}
    env_file: ../../.env
    restart: always
    ports:
      - "${APP_EXPOSE_PORT:-8000}:8000"
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:latest
    restart: always
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    ports:
      - "${NGINX_EXPOSE_PORT:-80}:80"
      - "${NGINX_SSL_EXPOSE_PORT:-443}:443"
    networks:
      - app-network
    depends_on:
      - fastapi

  certbot:
    image: certbot/certbot
    restart: always
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 48h & wait $${!}; done;'"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - app-network
    depends_on:
      - nginx

volumes:
  mysql_data:
  certbot-conf:
  certbot-www:

networks:
  app-network:
    driver: bridge
