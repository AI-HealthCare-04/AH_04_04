upstream fastapi {
    server fastapi:8000;
}

# http — ACME 갱신 경로만 열어두고 나머지는 https로 보낸다.
server {
    listen 80;
    server_name 도메인;

    # certbot webroot 갱신 경로 (https로 리다이렉트하면 갱신이 실패한다)
    location /.well-known/acme-challenge/ {
       root /var/www/certbot;
    }

    location /api/ {
        return 301 https://$host$request_uri;
    }

    location / {
        return 404;
    }
}

# https
server {
    listen 443 ssl;
    http2 on;
    server_name 도메인;

    ssl_certificate     /etc/letsencrypt/live/도메인/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/도메인/privkey.pem;

    # certbot 의 options-ssl-nginx.conf 와 ssl-dhparams.pem 은 **certbot nginx 플러그인**을
    #   설치했을 때만 생성된다. 우리는 `certonly --webroot` 로 발급하므로 두 파일이 없다.
    #   include 로 참조하면 nginx 가 기동에 실패한다("open() ... failed") — 그래서 같은 수준의
    #   설정을 여기에 직접 둔다. ECDHE 계열만 쓰므로 ssl_dhparam(DHE 용)도 필요 없다.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 앱은 /api/ 만 쓰지만, 배포 확인용으로 /health 는 밖에서도 볼 수 있어야 한다(#101).
    #   이게 없으면 서버 생존 확인을 /api/docs 로 대신해야 한다.
    location = /health {
        proxy_pass http://fastapi/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location /api/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    location / {
        return 404;
    }
}
