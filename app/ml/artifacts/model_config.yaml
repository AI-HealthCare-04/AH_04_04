age_min: 65

training:
  source: KNHANES
  years: [2022, 2023, 2024]
  fit: full_labeled_sample
  weighting: unweighted

validation:
  random_holdout:
    test_size: 0.2
    random_state: 42
  stratified_cv:
    n_splits: 5
    shuffle: true
    random_state: 42

feature_sets:
  default: self_report_plus_waist
  fallback: self_report_minimal

target_label: sarcopenia_awgs2025
probability_type: raw
selected_threshold: 0.20

smote:
  enabled: false
  random_state: 42
