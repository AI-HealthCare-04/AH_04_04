services:
  nginx:
    image: nginx:latest
    restart: unless-stopped
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_EXPOSE_PORT:-80}:80"
    networks:
      - app-network
    depends_on:
      - fastapi

networks:
  app-network:
    external: true
